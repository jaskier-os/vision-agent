# Standalone CI for this service repo. Builds its own Dockerfile (SDK/context-mode
# vendored in-repo) with buildx --push (build+push atomic, no local image kept),
# then bumps the image tag in infrastructure/deploy (Flux reconciles).

variables:
  REGISTRY: localhost:5000
  # DEPLOY_REPO (SSH URL of the deploy manifests repo) is provided as a
  # protected CI/CD variable in the project settings.

stages:
  - build
  - deploy
  - sync

.build-and-push:
  stage: build
  tags: [shell]
  script:
    - IMAGE="${REGISTRY}/${SERVICE}"
    - docker buildx build -f ${DOCKERFILE} -t ${IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${IMAGE}:latest --push ${BUILD_CONTEXT}
    - docker image prune -f || true
    - docker builder prune -f --reserved-space=5GB || true

.deploy:
  stage: deploy
  tags: [shell]
  script:
    - |
      TMPDIR=$(mktemp -d)
      SSH_CMD="ssh -i /root/.ssh/flux-deploy -o StrictHostKeyChecking=no"
      GIT_SSH_COMMAND="${SSH_CMD}" git clone ${DEPLOY_REPO} ${TMPDIR}
      cd ${TMPDIR}
      git config user.email "ci@deploy.local"
      git config user.name "GitLab CI"
      for attempt in 1 2 3 4 5; do
        git reset --hard origin/main
        GIT_SSH_COMMAND="${SSH_CMD}" git pull --rebase origin main
        find apps/ -name deployment.yaml -exec \
          sed -i "s|image: ${REGISTRY}/${SERVICE}:.*|image: ${REGISTRY}/${SERVICE}:${CI_COMMIT_SHORT_SHA}|" {} +
        git add -A
        if git diff --cached --quiet; then echo "No image change for ${SERVICE}"; break; fi
        git commit -m "deploy: ${SERVICE} ${CI_COMMIT_SHORT_SHA}"
        if GIT_SSH_COMMAND="${SSH_CMD}" git push origin main; then echo "pushed (attempt ${attempt})"; break; fi
        echo "push failed ${attempt}/5"; sleep 1
      done
      rm -rf ${TMPDIR}

build:
  extends: .build-and-push
  variables:
    SERVICE: vision-agent
    DOCKERFILE: Dockerfile.agent
    BUILD_CONTEXT: "."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

deploy:
  extends: .deploy
  variables:
    SERVICE: vision-agent
  needs: [build]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# Two-way GitLab<->GitHub sync. GitLab is canonical and VPN-only, so sync is
# GitLab-initiated:
#   - push to main          -> immediate GitLab->GitHub propagation.
#   - scheduled (every 10m)  -> pulls GitHub-side changes (PR merges) back; cheap
#                              ls-remote pre-check exits fast when already in sync.
# Conflicts open a GitHub PR (see scripts/sync-gitlab-github.sh).
sync-github:
  stage: sync
  tags: [shell]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_AUTHOR != "gitlab-github-sync <sync-bot@jaskier-os>"'
  script:
    - bash scripts/sync-gitlab-github.sh
